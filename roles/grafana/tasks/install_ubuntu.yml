---

- name: Install dependencies
  apt:
    name:
      - adduser
      - libfontconfig1
    state: present
    update_cache: yes

- name: Download Grafana package
  get_url:
    url: https://dl.grafana.com/oss/release/grafana_10.0.0_amd64.deb
    dest: /tmp/grafana.deb

- name: Install Grafana
  apt:
    deb: /tmp/grafana.deb
